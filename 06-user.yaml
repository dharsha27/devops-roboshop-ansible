- name: configure the user
  hosts: user
  become: yes
  tasks:
    - name: enable nodejs 20
      ansible.builtin.command: dnf module enable nodejs:20 -y
   
    - name: install nodejs 20
      ansible.builtin.package:
        name: nodejs
        state: present
    
    - name: create a system user
      ansible.builtin.user:
        name: roboshop
        system: true
        home: /app
        shell: /sbin/nologin
        comment: "roboshop system user"
    
    - name: remvoe the /app
      ansible.builtin.file:
         path: /app
         state: absent
  
    - name: remvoe the user zip file
      ansible.builtin.file:
         path: /tmp/user.zip
         state: absent

    - name: create app directory
      ansible.builtin.file:
        path: /app
        state: directory

    - name: download the user
      ansible.builtin.get_url:
         url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
         dest: /tmp/user.zip

    - name: unzip unarchive
      ansible.builtin.unarchive:
        src: /tmp/user.zip
        dest: /app
        remote_src: yes
      
    - name: install dependencies
      community.general.npm:
        path: /app

    - name: copy the user service
      template:
        src: user.service.j2
        dest: /etc/systemd/system/user.service

    - name: deamon reload
      systemd_service:
        name: user
        daemon_reload: true
      # when: unit_file.change

    - name: start and enable the user
      service:
        name: user
        state: started
        enabled: yes
        
