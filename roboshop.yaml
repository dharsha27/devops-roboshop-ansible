- name: roboshop instance management
  hosts: localhost
  connection: local
  vars:
    instances: ["mysql", "rabbitmq", "redis", "mongodb","frontend"]
    image_id: ami-0220d79f3f480ecf5
    domain_name: devopspractice.online
  tasks:
    - name: create AWS instances
      amazon.aws.ec2_instance:
        name: "roboshop-{{ item }}"
        image_id: "{{ image_id }}"
        instance_type: t3.micro
        security_groups:
          - "roboshop-{{ item }}"
          - "roboshop-common"
      loop: "{{ instances }}"
      register: ec2_output
      when: action == "create"
    # - name: print output
    #   debug:
    #      msg: "{{ ec2_output }}"

    # - name: create route 53 records
    #   debug:
    #     msg: "Instance Name: {{item.item}} PrivateIPAddress:{{item.instances[0].private_ip_address}}"
    #   loop: "{{ ec2_output.results }}"


    - name: Creating route 53 records
      amazon.aws.route53:
          state: present
          zone:  "{{ domain_name }}"
          record: "{{ item.item }}.{{ domain_name }}"
          type: A
          ttl: 1
          value: "{{item.instances[0].private_ip_address}}"
          overwrite: true
      loop: "{{ ec2_output.results }}"

    - name: Creating route 53 records for frontend
      amazon.aws.route53:
          state: present
          zone:  "{{ domain_name }}"
          record: "{{ domain_name }}"
          type: A
          ttl: 1
          value: "{{item.instances[0].public_ip_address}}"
          overwrite: true
      loop: "{{ ec2_output.results }}"
      when: 
        - item.item == "frontend"
        - action == "create"


    - name: Delete the r53 record
      amazon.aws.route53:
        state : absent
        zone: "{{ domain_name }}"
        record: "{{ domain_name }}"
        type: A
        ttl: 1
      loop: "{{ instances }}"
      when: 
        - action == "delete"
        - item   == "frontend"


    - name: Delete the instances record
      amazon.aws.ec2_instance:
        state : absent
        name: "roboshop-{{ item }}"
      loop: "{{ instances }}"
      when: action == "delete"
       
      
