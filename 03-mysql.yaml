- name: configure the mysql server
  hosts: mysql
  become: yes
  tasks:
  - name: Install mysql 
      ansible.builtin.package:
        name: mysql-server
        state: present
  - name: start and enable the service
      service:
         name: mysqld
         state: started
         enabled: yes

  - name: set up the root password
    command: mysql_secure_installation --set-root-pass RoboShop@1