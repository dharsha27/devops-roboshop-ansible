- name: configure the rabbitmq server
  hosts: rabbitmq
  become: yes
  tasks:

    - name: copy the rabbitmq
      copy:
        src: rabbitmq.repo
        dest: /etc/yum.repos.d/rabbitmq.repo
 
    - name: Install rabbitmq 
      ansible.builtin.package:
        name: rabbitmq-server
        state: present

    - name: start and enable the rabbitmq service
      service:
        name: rabbitmq-server
        state: started
        enabled: yes

    - name: create roboshop rabbitmq
      community.rabbitmq.rabbitmq_user:
        user: roboshop
        password: roboshop123
        permissions:
          - vhost: /
            configure_priv: .*
            read_priv: .*
            write_priv: .*
        state: present 
